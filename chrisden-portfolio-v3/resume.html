<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resume — Chrisden Cristobal</title>
  <meta name="description" content="View the resume of Chrisden Cristobal.">
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: var(--bg-alt); }
    .frame-wrap { height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: rgba(15,18,32,.7); backdrop-filter: blur(6px); }
    header .container { display: flex; justify-content: space-between; align-items: center; }
    .actions { display: flex; gap: 10px; }
    iframe { width: 100%; height: 100%; border: 0; background: #fff; }
  </style>
</head>
<body>
  <div class="frame-wrap">
    <header>
      <div class="container">
        <strong>Chrisden Cristobal — Resume</strong>
        <div class="actions">
          <a class="btn btn--ghost" href="./">← Back</a>
          <a class="btn btn--primary" id="dl" href="#" download>Download .DOCX</a>
        </div>
      </div>
    </header>
    <iframe id="viewer" title="Resume preview"></iframe>
  </div>
  <script>
    const DOCX_REL = 'assets/resume/Chrisden_Cristobal_Resume.docx';
    const docxUrl = new URL(DOCX_REL, location.origin).href;
    const officeViewer = 'https://view.officeapps.live.com/op/embed.aspx?src=' + encodeURIComponent(docxUrl);
    document.getElementById('viewer').src = officeViewer;
    document.getElementById('dl').href = DOCX_REL;
  </script>
</body>
</html>
